# ==========================================
# Employee Management System - Configuration
# ==========================================

# Server
server.port=8080

# Application Name
spring.application.name=employee-management-system

# ==========================================
# MySQL DataSource Configuration
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/yor_database?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# HikariCP Connection Pool (used by default)
# ==========================================
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.pool-name=EMS-HikariCP

# ==========================================
# SQL Initialization (run schema.sql on startup)
# ==========================================
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# ==========================================
# Logging
# ==========================================
#logging.level.com.ems=DEBUG
#logging.level.org.springframework.jdbc=DEBUG
logging.level.org.springframework.jdbc.datasource.init.ScriptUtils=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%level] %logger{36} - %msg%n
